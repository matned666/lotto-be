spring:
  application:
    name: lotto-check
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  datasource:
    url: ${lottocheck.datasource.url}
    username: ${lottocheck.datasource.username}
    password: ${lottocheck.datasource.password}
    driver-class-name: ${lottocheck.datasource.driver-class-name}
  liquibase:
    enabled: true
    change-log: classpath:db/changelog.xml
    database-change-log-table: DATABASECHANGELOG
    database-change-log-lock-table: DATABASECHANGELOGLOCK
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${lottocheck.oauth.github-client-id}
            client-secret: ${lottocheck.oauth.github-client-secret}
            scope:
              - read:user
              - user:email
          google:
            client-id: ${lottocheck.oauth.google-client-id}
            client-secret: ${lottocheck.oauth.google-client-secret}
            scope:
              - openid
              - profile
              - email
app:
  security:
    login-success-url: ${lottocheck.local.frontend-url}
    logout-success-url: ${lottocheck.local.frontend-url}/login
    allowed-origin-patterns:
      - ${lottocheck.local.frontend-url}
      - ${lottocheck.local.frontend-ip-url}
lotto:
  client:
    key: ${lottocheck.lotto.client.key}
    host: https://developers.lotto.pl
    endpoints:
      byDatePerGame: /api/open/v1/lotteries/draw-results/by-date-per-game
server:
  port: ${PORT:8080}
  forward-headers-strategy: ${SERVER_FORWARD_HEADERS_STRATEGY:framework}
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}
logging:
  file:
    path: ${lottocheck.logging.file.path:/var/log/lotto-check}
  level:
    liquibase: INFO

lottocheck:
  logging:
    file:
      max-size: ${LOTTOCHECK_LOGGING_FILE_MAX_SIZE:50 MB}
      archive-max-age: ${LOTTOCHECK_LOGGING_FILE_ARCHIVE_MAX_AGE:P30D}
      archive-total-size: ${LOTTOCHECK_LOGGING_FILE_ARCHIVE_TOTAL_SIZE:2 GB}
      archive-max-files: ${LOTTOCHECK_LOGGING_FILE_ARCHIVE_MAX_FILES:200}
